<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LBC • Spin to Win</title>
    <style>
      :root {
        --bg: #0d0f12;
        --panel: #2a2e36;
        --panel-2: #20242b;
        --text: #e9edf2;
        --muted: #a7b0bc;
        --gold-1: #f8e49c;
        --gold-2: #f1c74a;
        --gold-3: #b98a28;
        --accent: #7ec8ff;
        --success: #39d98a;
        --danger: #ff6b6b;
        --shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(
            1200px 700px at 20% -10%,
            rgba(241, 199, 74, 0.25),
            transparent 40%
          ),
          radial-gradient(
            1600px 900px at 120% 120%,
            rgba(185, 138, 40, 0.2),
            transparent 40%
          ),
          var(--bg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial,
          Noto Sans;
        letter-spacing: 0.2px;
        overflow-x: hidden;
      }
      #safe-area {
        padding: clamp(16px, 2vw, 24px);
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .panel {
        width: min(1200px, 94vw);
        margin: auto;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.02)
        );
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .panel__header,
      .panel__footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.3),
          rgba(0, 0, 0, 0.15)
        );
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        flex-wrap: wrap;
        gap: 10px;
      }
      .panel__footer {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: none;
      }
      .header__left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
        font-size: clamp(20px, 2.4vw, 28px);
        letter-spacing: 0.6px;
        text-transform: uppercase;
        background: linear-gradient(
          90deg,
          var(--gold-1),
          var(--gold-2),
          var(--gold-3)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .pulse-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 0 0 rgba(57, 217, 138, 0.7);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(57, 217, 138, 0.7);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(57, 217, 138, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(57, 217, 138, 0);
        }
      }
      .header__right {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .lang-toggle {
        display: flex;
        gap: 6px;
      }
      .lang-toggle button {
        border: 1px solid rgba(241, 199, 74, 0.35);
        background: rgba(241, 199, 74, 0.1);
        color: var(--gold-1);
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }
      .lang-toggle button[aria-pressed="true"] {
        background: linear-gradient(180deg, var(--gold-2), var(--gold-3));
        color: #111;
        border-color: rgba(0, 0, 0, 0.2);
      }
      .grid {
        display: grid;
        grid-template-columns: 320px 1fr 280px;
        gap: 18px;
        padding: 18px 22px;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px;
      }
      .card h2 {
        margin: 0 0 10px 0;
        font-size: 16px;
        color: var(--gold-1);
      }
      .meta {
        font-size: 13px;
        color: var(--muted);
      }
      .winners {
        list-style: none;
        padding: 0;
        margin: 8px 0 0 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .winners li {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 8px 10px;
      }
      .badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        background: linear-gradient(180deg, #fff, #d7d7d7);
        color: #111;
        font-weight: 800;
      }
      .badge--warn {
        background: linear-gradient(180deg, #ffeede, #ffd1ae);
      }
      .wheel-wrap {
        position: relative;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 20px;
        min-height: 420px;
      }
      #wheelCanvas {
        width: min(540px, 80vw);
        height: min(540px, 80vw);
        max-width: 540px;
        max-height: 540px;
      }
      .pointer {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 14px solid transparent;
        border-right: 14px solid transparent;
        border-top: 22px solid var(--gold-2);
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
      }
      .spin-btn {
        position: absolute;
        inset: auto;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 900;
        background: rgba(241, 199, 74, 0.1);
        color: var(--gold-1);
        border: 1px solid rgba(241, 199, 74, 0.35);
        cursor: pointer;
      }
      .metric {
        display: flex;
        justify-content: space-between;
        padding: 8px 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        margin-top: 8px;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="safe-area">
      <section class="panel">
        <header class="panel__header">
          <div class="header__left">
            <h1 id="title">Spin to Win</h1>
            <span class="pulse-dot" style="margin-left: 8px"></span>
          </div>
          <div class="header__right">
            <div class="status" id="status">
              <span>Status: </span><strong>Live</strong>
            </div>
            <div class="lang-toggle" role="group">
              <button data-lang="en" aria-pressed="true">ENG</button>
              <button data-lang="es" aria-pressed="false">ESP</button>
              <button data-lang="fr" aria-pressed="false">FRA</button>
            </div>
          </div>
        </header>
        <div class="grid">
          <aside class="card">
            <h2 id="ui_subtitle">Tap to spin when eligible</h2>
            <div class="meta" id="eligibilityHint">Rule: $50 tip = 1 spin</div>
            <div class="metric">
              <span id="fairnessLabel">Fairness</span
              ><span id="fairBadge" class="badge badge--warn">UNVERIFIED</span>
            </div>
            <h2 id="recentWinnersHeader" style="margin-top: 14px">
              Recent winners
            </h2>
            <ol id="winners" class="winners" aria-live="polite"></ol>
          </aside>
          <main class="wheel-wrap">
            <canvas id="wheelCanvas" width="540" height="540"></canvas>
            <div class="pointer"></div>
            <button id="spinBtn" class="spin-btn">SPIN (Demo)</button>
          </main>
          <aside class="card">
            <h2 id="sessionHeader">Session</h2>
            <div class="metric">
              <span id="spinsTodayLabel">Spins today</span
              ><strong id="spinsToday">0</strong>
            </div>
            <div class="metric">
              <span id="winsTodayLabel">Wins today</span
              ><strong id="winsToday">0</strong>
            </div>
            <h2 id="topFanHeader" style="margin-top: 14px">Top Fan</h2>
            <div class="metric">
              <span id="topFanLabel"> — </span
              ><strong id="topFanScore">—</strong>
            </div>
            <div class="small" style="margin-top: 10px">
              Source: <strong>/data/overlay/spin.json</strong> • WS Active
            </div>
          </aside>
        </div>
        <footer class="panel__footer">
          <div class="small" id="ticker">Waiting for first spin...</div>
          <div class="small" id="clock"></div>
        </footer>
      </section>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const WHEEL_URL =
        params.get("wheel") || params.get("json") || "/data/overlay/spin.json";
      const WS_URL = params.get("ws") || "wss://overlays.lbc.domain/ws/events";
      const ROOM = params.get("room_id") || "demo_room";

      const UI = {
        en: {
          title: "Spin to Win",
          subtitle: "Tap to spin when eligible",
          status: "Status: ",
          live: "Live",
          recentWinners: "Recent Winners",
          session: "Session",
          spinsToday: "Spins today",
          winsToday: "Wins today",
          spinBtn: "SPIN",
          ticker: (n, p) => `${n} won “${p}”`,
          rule: (n) => `Rule: $${n} tip = 1 spin`,
        },
        es: {
          title: "Gira y Gana",
          subtitle: "Toca para girar",
          status: "Estado: ",
          live: "En vivo",
          recentWinners: "Ganadores",
          session: "Sesión",
          spinsToday: "Giros",
          winsToday: "Victorias",
          spinBtn: "GIRAR",
          ticker: (n, p) => `${n} ganó “${p}”`,
          rule: (n) => `Regla: propina de $${n} = 1 giro`,
        },
        fr: {
          title: "Tourne et Gagne",
          subtitle: "Touchez pour tourner",
          status: "Statut : ",
          live: "En direct",
          recentWinners: "Gagnants",
          session: "Session",
          spinsToday: "Tours",
          winsToday: "Victoires",
          spinBtn: "TOURNER",
          ticker: (n, p) => `${n} a gagné « ${p} »`,
          rule: (n) => `Règle : pourboire ${n}$ = 1 tour`,
        },
      };

      let LANG = "en";
      let _langTimer = null;
      let CFG = {};
      const canvas = document.getElementById("wheelCanvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      let angleBase = 0,
        anim = null;
      let spinsCount = 0;

      function tr(v) {
        return v && typeof v === "object"
          ? v[LANG] || v.en || v.es || v.fr || Object.values(v)[0]
          : v;
      }

      function drawWheel() {
        if (!CFG.wedges) return;
        const W = canvas.width,
          H = canvas.height,
          R = Math.min(W, H) / 2 - 6;
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.rotate((angleBase * Math.PI) / 180);
        const n = CFG.wedges.length,
          step = (2 * Math.PI) / n;
        for (let i = 0; i < n; i++) {
          const w = CFG.wedges[i],
            a0 = i * step,
            a1 = (i + 1) * step;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, R, a0, a1, false);
          ctx.closePath();
          ctx.fillStyle = w.style?.color || "#444";
          ctx.fill();
          ctx.strokeStyle = "rgba(0,0,0,.35)";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.save();
          ctx.rotate(a0 + (a1 - a0) / 2);
          ctx.translate(R * 0.68, 0);
          ctx.rotate(Math.PI / 2);
          ctx.fillStyle = "#0d0f12";
          ctx.font = "bold 14px ui-sans-serif,system-ui,-apple-system";
          ctx.textAlign = "center";
          ctx.fillText(tr(w.label), 0, 0);
          ctx.restore();
        }
        ctx.beginPath();
        ctx.arc(0, 0, R * 0.18, 0, 2 * Math.PI);
        ctx.fillStyle = "#111";
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,.2)";
        ctx.stroke();
        ctx.restore();
      }

      function executeSpin(wedgeId, userName) {
        if (anim) cancelAnimationFrame(anim);
        spinsCount++;
        document.getElementById("spinsToday").textContent = String(spinsCount);
        const start = performance.now(),
          from = angleBase,
          to = from + 8 * 360 + 180;
        (function frame(t) {
          const p = Math.min(1, (t - start) / 4000);
          const eased =
            p < 0.6
              ? (1 - Math.pow(1 - p / 0.6, 3)) * 0.8
              : 0.8 +
                ((p - 0.6) / 0.4) *
                  (1 - (1 - Math.pow(1 - (p - 0.6) / 0.4, 2)) / 2) *
                  0.2;
          angleBase = from + eased * (to - from);
          drawWheel();
          if (p < 1) anim = requestAnimationFrame(frame);
        })(start);
        setTimeout(() => {
          const n = CFG.wedges.length,
            idx = Math.max(
              0,
              CFG.wedges.findIndex((w) => w.id === wedgeId),
            );
          const center = idx * (360 / n) + 360 / n / 2;
          const target = angleBase + 8 * 360 + (360 - (center % 360)) + 0.001;
          const s2 = performance.now(),
            f2 = angleBase;
          (function f(t) {
            const p = Math.min(1, (t - s2) / 1200);
            const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
            angleBase = f2 + eased * (target - f2);
            drawWheel();
            if (p < 1) anim = requestAnimationFrame(f);
            else announceWin(userName || "Winner", wedgeId);
          })(s2);
        }, 600);
      }

      function announceWin(name, wedgeId) {
        const w = CFG.wedges.find((x) => x.id === wedgeId);
        const label = w ? tr(w.label) : wedgeId;
        const li = document.createElement("li");
        li.innerHTML = `<span>${name}</span><span>${label}</span>`;
        const winners = document.getElementById("winners");
        winners.prepend(li);
        if (winners.children.length > 3) winners.removeChild(winners.lastChild);
        document.getElementById("ticker").textContent = UI[LANG].ticker(
          name,
          label,
        );
        const winsEl = document.getElementById("winsToday");
        winsEl.textContent = String((+winsEl.textContent || 0) + 1);
      }

      document.getElementById("spinBtn").addEventListener("click", () => {
        // Local demo spin logic
        const rId =
          CFG.wedges[Math.floor(Math.random() * CFG.wedges.length)].id;
        executeSpin(rId, "Demo User");
      });

      // WebSocket Connection
      if (WS_URL) {
        try {
          const ws = new WebSocket(WS_URL);
          ws.onopen = () =>
            ws.send(JSON.stringify({ type: "subscribe", room_id: ROOM }));
          ws.onmessage = (evt) => {
            try {
              const msg = JSON.parse(evt.data);
              const payload = msg.event ? msg.event : msg;
              if (payload.type === "spin.trigger") {
                const w = CFG.wedges[payload.winnerIndex] || CFG.wedges[0];
                executeSpin(w.id, payload.username || "Fan");
              }
            } catch (e) {}
          };
        } catch (e) {}
      }

      async function loadWheel() {
        try {
          const res = await fetch(WHEEL_URL, { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          CFG = await res.json();
        } catch (e) {
          console.warn("Using default. Error:", e);
          CFG = {
            wedges: [
              {
                id: "1",
                label: { en: "Prize 1" },
                style: { color: "#f8e49c" },
              },
              {
                id: "2",
                label: { en: "Prize 2" },
                style: { color: "#ff6b6b" },
              },
            ],
          };
        }
        setLang("en");
      }

      function setLang(code) {
        LANG = code;
        document
          .querySelectorAll(".lang-toggle button")
          .forEach((b) =>
            b.setAttribute("aria-pressed", String(b.dataset.lang === LANG)),
          );
        const t = UI[LANG] || UI.en;
        document.getElementById("title").textContent = t.title;
        document.getElementById("ui_subtitle").textContent = t.subtitle;
        document.getElementById("eligibilityHint").textContent = t.rule(
          CFG.eligibility?.threshold_usd || 50,
        );
        document.getElementById("spinBtn").textContent = t.spinBtn;
        drawWheel();
      }

      document.querySelectorAll(".lang-toggle button").forEach((b) =>
        b.addEventListener("click", () => {
          clearInterval(_langTimer);
          setLang(b.dataset.lang);
        }),
      );

      loadWheel();
      setInterval(() => {
        document.getElementById("clock").textContent =
          new Date().toLocaleTimeString();
      }, 1000);
    </script>
  </body>
</html>
