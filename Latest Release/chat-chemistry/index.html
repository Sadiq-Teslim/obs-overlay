<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LBC • Chat Chemistry</title>
    <style>
      :root {
        --bg: #0d0f12;
        --panel: #2a2e36;
        --panel-2: #20242b;
        --text: #e9edf2;
        --muted: #a7b0bc;
        --gold-1: #f8e49c;
        --gold-2: #f1c74a;
        --gold-3: #b98a28;
        --success: #39d98a;
        --accent: #7ec8ff;
        --danger: #ff6b6b;
        --hot: #ff8c42;
        --shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(
            1200px 700px at 20% -10%,
            rgba(255, 140, 66, 0.15),
            transparent 40%
          ),
          radial-gradient(
            1600px 900px at 120% 120%,
            rgba(185, 138, 40, 0.2),
            transparent 40%
          ),
          var(--bg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial,
          Noto Sans;
        letter-spacing: 0.2px;
        overflow-x: hidden;
      }
      #safe-area {
        padding: clamp(16px, 2vw, 24px);
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .panel {
        width: min(980px, 92vw);
        margin: auto;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.02)
        );
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .panel__header,
      .panel__footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.3),
          rgba(0, 0, 0, 0.15)
        );
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        flex-wrap: wrap;
        gap: 10px;
      }
      .panel__footer {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: none;
      }
      .header__left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
        font-size: clamp(20px, 2.4vw, 28px);
        letter-spacing: 0.6px;
        text-transform: uppercase;
        background: linear-gradient(
          90deg,
          var(--gold-1),
          var(--gold-2),
          var(--gold-3)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .pulse-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 0 0 rgba(57, 217, 138, 0.7);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(57, 217, 138, 0.7);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(57, 217, 138, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(57, 217, 138, 0);
        }
      }
      .header__right {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .lang-toggle {
        display: flex;
        gap: 6px;
      }
      .lang-toggle button {
        border: 1px solid rgba(241, 199, 74, 0.35);
        background: rgba(241, 199, 74, 0.1);
        color: var(--gold-1);
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }
      .lang-toggle button[aria-pressed="true"] {
        background: linear-gradient(180deg, var(--gold-2), var(--gold-3));
        color: #111;
        border-color: rgba(0, 0, 0, 0.2);
      }
      .content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        padding: 18px 22px;
      }
      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 16px;
      }
      .card h2 {
        margin: 0 0 14px 0;
        font-size: 16px;
        color: var(--gold-1);
        letter-spacing: 0.5px;
      }

      /* Thermometer styling */
      .heat-meter {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .heat-val {
        font-size: 48px;
        font-weight: 900;
        background: linear-gradient(90deg, var(--gold-1), var(--hot));
        -webkit-background-clip: text;
        color: transparent;
        line-height: 1;
      }
      .heat-label {
        color: var(--muted);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 8px;
      }
      .heat-bar-bg {
        margin-top: 16px;
        height: 16px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        overflow: hidden;
      }
      .heat-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--accent),
          var(--gold-2),
          var(--hot),
          var(--danger)
        );
        transition: width 1s ease-in-out;
      }

      .vibe-tag {
        display: inline-block;
        padding: 8px 16px;
        background: rgba(255, 140, 66, 0.15);
        border: 1px solid rgba(255, 140, 66, 0.4);
        border-radius: 999px;
        font-weight: 800;
        color: var(--hot);
        margin-top: 16px;
        font-size: 14px;
      }

      .list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 10px 14px;
      }
      .list li .name {
        font-weight: 800;
      }
      .list li .msgs {
        font-variant-numeric: tabular-nums;
        color: var(--gold-1);
        font-weight: 900;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
      }
      @media (max-width: 768px) {
        .content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="safe-area">
      <section class="panel">
        <header class="panel__header">
          <div class="header__left">
            <h1 id="title">Chat Chemistry</h1>
            <span class="pulse-dot" title="Live"></span>
          </div>
          <div class="header__right">
            <div class="lang-toggle" role="group">
              <button data-lang="en" aria-pressed="true">ENG</button>
              <button data-lang="es" aria-pressed="false">ESP</button>
              <button data-lang="fr" aria-pressed="false">FRA</button>
            </div>
          </div>
        </header>

        <div class="content">
          <div class="card">
            <h2 id="heatHeader">Room Temperature</h2>
            <div class="heat-meter">
              <div class="heat-val" id="heatValue">0%</div>
              <div class="heat-label" id="heatLabel">Warming Up</div>
              <div class="heat-bar-bg">
                <div class="heat-bar-fill" id="heatFill"></div>
              </div>
              <div class="vibe-tag" id="vibeTag">💬 Chatting</div>
            </div>
          </div>

          <div class="card">
            <h2 id="topChattersHeader">Top Chatters</h2>
            <ul class="list" id="chattersList">
              <!-- JS Injected -->
            </ul>
          </div>
        </div>

        <footer class="panel__footer">
          <div class="small" id="footnote">
            Source: <strong>/data/overlay/chat-chemistry.json</strong>
          </div>
          <div class="small" id="clock"></div>
        </footer>
      </section>
    </div>

    <script>
      const params = new URLSearchParams(location.search);
      const JSON_URL =
        params.get("json") || "/data/overlay/chat-chemistry.json";
      const WS_URL = params.get("ws") || "wss://overlays.lbc.domain/ws/events";
      const ROOM = params.get("room_id") || "demo_room";

      const UI = {
        en: {
          title: "Chat Chemistry",
          heat: "Room Temperature",
          top: "Top Chatters",
          vibe: "Current Vibe:",
        },
        es: {
          title: "Química del Chat",
          heat: "Temperatura de la Sala",
          top: "Mejores Charladores",
          vibe: "Ambiente:",
        },
        fr: {
          title: "Chimie du Chat",
          heat: "Température du Salon",
          top: "Meilleurs Bavards",
          vibe: "Ambiance :",
        },
      };

      const DEMO = {
        heat_pct: 78,
        vibe_emoji: "🔥",
        vibe_text: { en: "Spicy", es: "Picante", fr: "Épicé" },
        chatters: [
          { name: "LoverBoy99", messages: 142 },
          { name: "AlphaWolf", messages: 89 },
          { name: "User_19x", messages: 45 },
          { name: "SilentWatcher", messages: 12 },
        ],
      };

      let CFG = DEMO;
      let LANG = "en";
      let _langTimer = null;

      function tr(v) {
        return v && typeof v === "object"
          ? v[LANG] || v.en || v.es || v.fr || Object.values(v)[0]
          : v;
      }

      function render() {
        if (!CFG) CFG = DEMO;
        const heat = Math.min(100, Math.max(0, CFG.heat_pct || 0));
        document.getElementById("heatValue").textContent = `${heat}%`;
        document.getElementById("heatFill").style.width = `${heat}%`;

        let label = "Warming Up";
        if (heat > 85) label = "On Fire!";
        else if (heat > 60) label = "Hot";
        else if (heat > 30) label = "Warm";
        document.getElementById("heatLabel").textContent = label;

        document.getElementById("vibeTag").textContent =
          `${CFG.vibe_emoji || "💬"} ${tr(CFG.vibe_text) || "Chatting"}`;

        const list = document.getElementById("chattersList");
        list.innerHTML = "";
        (CFG.chatters || []).slice(0, 4).forEach((c) => {
          const li = document.createElement("li");
          li.innerHTML = `<span class="name">${c.name}</span><span class="msgs">${c.messages} msgs</span>`;
          list.appendChild(li);
        });
      }

      function applyChrome() {
        const t = UI[LANG] || UI.en;
        document.getElementById("title").textContent = t.title;
        document.getElementById("heatHeader").textContent = t.heat;
        document.getElementById("topChattersHeader").textContent = t.top;
      }

      function setLang(code) {
        LANG = code;
        document
          .querySelectorAll(".lang-toggle button")
          .forEach((b) =>
            b.setAttribute("aria-pressed", String(b.dataset.lang === LANG)),
          );
        applyChrome();
        render();
      }

      document.querySelectorAll(".lang-toggle button").forEach((b) =>
        b.addEventListener("click", () => {
          clearInterval(_langTimer);
          setLang(b.dataset.lang);
        }),
      );

      setInterval(() => {
        const langs = ["en", "es", "fr"];
        if (!document.hidden) setLang(langs[(langs.indexOf(LANG) + 1) % 3]);
      }, 15000);

      async function pollData() {
        try {
          const res = await fetch(JSON_URL, { cache: "no-cache" });
          if (res.ok) {
            CFG = await res.json();
            render();
          }
        } catch (e) {}
      }

      if (WS_URL) {
        try {
          const ws = new WebSocket(WS_URL);
          ws.onopen = () =>
            ws.send(JSON.stringify({ type: "subscribe", room_id: ROOM }));
          ws.onmessage = (evt) => {
            try {
              const msg = JSON.parse(evt.data);
              const payload = msg.event ? msg.event : msg;
              if (payload.type === "chemistry.update") {
                CFG = payload.data;
                render();
              }
            } catch (e) {}
          };
        } catch (e) {}
      }

      setLang("en");
      pollData();
      setInterval(pollData, 10000);
      setInterval(() => {
        document.getElementById("clock").textContent =
          new Date().toLocaleTimeString();
      }, 1000);
    </script>
  </body>
</html>
